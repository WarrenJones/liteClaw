<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'SF Pro Display', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="feishuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <linearGradient id="handlerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="cmdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <linearGradient id="rateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="sendGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowWhite" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#cbd5e1"/>
    </marker>
    <marker id="arrowYellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c4b5fd"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#fb7185"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6ee7b7"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#67e8f9"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#f8fafc" font-size="20" font-weight="700" letter-spacing="1">LiteClaw · Phase 2 — Agent 基础设施</text>

  <!-- ========== Top: Feishu Message Event ========== -->
  <g filter="url(#shadow)">
    <rect x="370" y="65" width="220" height="45" rx="10" fill="url(#feishuGrad)"/>
    <text x="480" y="87" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Feishu Message Event</text>
    <text x="480" y="103" text-anchor="middle" fill="#bae6fd" font-size="9">im.message.receive_v1</text>
  </g>

  <!-- Arrow: Event → Handler -->
  <path d="M480,110 L480,150" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- Message Handler -->
  <g filter="url(#shadow)">
    <rect x="370" y="155" width="220" height="55" rx="10" fill="url(#handlerGrad)"/>
    <text x="480" y="180" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">feishu-message-handler</text>
    <text x="480" y="200" text-anchor="middle" fill="#e0e7ff" font-size="9">消息处理编排中心</text>
  </g>

  <!-- ========== Row 2: Four branches ========== -->

  <!-- Arrow: Handler → Command Router -->
  <path d="M390,210 L160,260" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowYellow)"/>

  <!-- Arrow: Handler → Rate Limiter -->
  <path d="M430,210 L330,260" stroke="#67e8f9" stroke-width="1.5" marker-end="url(#arrowCyan)"/>

  <!-- Arrow: Handler → Store -->
  <path d="M520,210 L600,260" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Arrow: Handler → LLM -->
  <path d="M560,210 L760,260" stroke="#c4b5fd" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Command Router -->
  <g filter="url(#shadow)">
    <rect x="50" y="265" width="160" height="70" rx="10" fill="url(#cmdGrad)"/>
    <text x="130" y="293" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Command Router</text>
    <text x="130" y="313" text-anchor="middle" fill="#fef3c7" font-size="9">/help · /reset · /status · /tools</text>
  </g>

  <!-- Rate Limiter -->
  <g filter="url(#shadow)">
    <rect x="240" y="265" width="160" height="70" rx="10" fill="url(#rateGrad)"/>
    <text x="320" y="293" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Rate Limiter</text>
    <text x="320" y="313" text-anchor="middle" fill="#cffafe" font-size="9">滑动窗口 · 按 chat_id 限流</text>
  </g>

  <!-- Conversation Store -->
  <g filter="url(#shadow)">
    <rect x="500" y="265" width="200" height="90" rx="10" fill="url(#storeGrad)" opacity="0.9"/>
    <text x="600" y="293" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">ConversationStore</text>
    <text x="600" y="313" text-anchor="middle" fill="#ffe4e6" font-size="9">统一存储接口 · 可切换后端</text>
    <!-- Memory sub-box -->
    <rect x="512" y="322" width="78" height="24" rx="5" fill="rgba(255,255,255,0.15)"/>
    <text x="551" y="338" text-anchor="middle" fill="#fecdd3" font-size="9">MemoryStore</text>
    <!-- Redis sub-box -->
    <rect x="600" y="322" width="88" height="24" rx="5" fill="rgba(255,255,255,0.15)"/>
    <text x="644" y="338" text-anchor="middle" fill="#fecdd3" font-size="9">RedisStore → Redis</text>
  </g>

  <!-- LLM Adapter -->
  <g filter="url(#shadow)">
    <rect x="730" y="265" width="180" height="70" rx="10" fill="url(#llmGrad)"/>
    <text x="820" y="293" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">LLM Adapter</text>
    <text x="820" y="313" text-anchor="middle" fill="#ede9fe" font-size="9">withTimeout · withRetry</text>
  </g>

  <!-- ========== Row 3: Feishu Sender ========== -->

  <!-- Arrow: Handler → Sender (down-right) -->
  <path d="M480,210 L480,390" stroke="#6ee7b7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- Feishu Sender -->
  <g filter="url(#shadow)">
    <rect x="370" y="395" width="220" height="50" rx="10" fill="url(#sendGrad)"/>
    <text x="480" y="418" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Feishu Sender</text>
    <text x="480" y="436" text-anchor="middle" fill="#d1fae5" font-size="9">withTimeout · 消息回复</text>
  </g>

  <!-- ========== Bottom: Infrastructure bar ========== -->
  <g filter="url(#shadow)">
    <rect x="50" y="460" width="860" height="50" rx="10" fill="url(#infraGrad)" opacity="0.7"/>
    <text x="100" y="490" text-anchor="middle" fill="#f1f5f9" font-size="10" font-weight="600">所有模块 →</text>

    <rect x="160" y="474" width="100" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="210" y="490" text-anchor="middle" fill="#cbd5e1" font-size="9">Structured Logger</text>

    <rect x="270" y="474" width="95" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="317" y="490" text-anchor="middle" fill="#cbd5e1" font-size="9">Error Classifier</text>

    <rect x="375" y="474" width="100" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="425" y="490" text-anchor="middle" fill="#cbd5e1" font-size="9">Timeout &amp; Retry</text>

    <rect x="485" y="474" width="90" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="530" y="490" text-anchor="middle" fill="#cbd5e1" font-size="9">Rate Limiter</text>

    <rect x="585" y="474" width="90" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="630" y="490" text-anchor="middle" fill="#cbd5e1" font-size="9">Event Dedup</text>

    <rect x="685" y="474" width="105" height="24" rx="4" fill="rgba(255,255,255,0.1)"/>
    <text x="737" y="490" text-anchor="middle" fill="#cbd5e1" font-size="9">Config (.env.local)</text>
  </g>

  <!-- Phase badge -->
  <rect x="815" y="65" width="95" height="40" rx="20" fill="#6366f1" opacity="0.9"/>
  <text x="862" y="82" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">Phase 2</text>
  <text x="862" y="96" text-anchor="middle" fill="#c7d2fe" font-size="8">基础设施</text>
</svg>
